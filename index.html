<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千王之王 - 骰子 Roguelite</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 主菜单 -->
        <section id="screen-main" class="screen">
            <header class="title-area">
                <h1>🎲 骰子游戏 🎲</h1>
            </header>
            
            <div class="selection-area">
                <div class="group">
                    <h2>选择对局</h2>
                    <div id="mode-options" class="card-grid"></div>
                </div>
                <div class="group">
                    <h2>选择初始骰子</h2>
                    <div id="dice-options" class="card-grid"></div>
                </div>
            </div>

            <footer class="action-area">
                <button id="btn-start" class="btn-primary">开始游戏</button>
                <div class="help-link">ⓘ 游戏说明</div>
            </footer>
        </section>

        <!-- 关卡界面 -->
        <section id="screen-level" class="screen hidden">
            <nav class="top-bar">
                <button id="btn-level-back" class="btn-back">← 返回主菜单</button>
                <div class="level-info">
                    <span id="txt-level-num">第 1 关</span>
                    <span id="txt-target">目标：500 点</span>
                    <span id="txt-throws">投掷次数：0 / 10</span>
                    <span id="txt-remaining">剩余：10</span>
                    <span class="score-label">当前累计：<span id="txt-total-score">0</span></span>
                </div>
            </nav>

            <div class="game-container">
                <aside class="side-panel left">
                    <div class="panel-section">
                        <h3>投掷历史</h3>
                        <div id="history-list" class="scroll-list">
                            <div class="empty-msg">暂无投掷记录</div>
                        </div>
                    </div>
                    <div class="panel-section">
                        <h3>消耗品使用</h3>
                        <div id="consume-history" class="scroll-list">
                            <div class="empty-msg">暂无使用记录</div>
                        </div>
                    </div>
                </aside>

                <main class="center-stage">
                    <div id="dice-table" class="dice-area"></div>
                    <button id="btn-roll" class="btn-roll">投掷</button>
                </main>

                <aside class="side-panel right">
                    <h3>👜 消耗品背包</h3>
                    <div id="inventory" class="inventory-grid">
                        <div class="slot empty"></div>
                        <div class="slot empty"></div>
                    </div>
                </aside>
            </div>
        </section>

        <!-- 出千商店 -->
        <section id="screen-shop" class="screen hidden">
            <nav class="top-bar">
                <button id="btn-shop-back" class="btn-back">← 返回主菜单</button>
                <div class="points-display">🪙 积分：<span id="txt-points">100</span></div>
            </nav>

            <div class="shop-content">
                <h1>出千商店</h1>
                <p class="subtitle">用积分购买升级和道具，提升你的千术</p>
                
                <div id="shop-items" class="shop-grid">
                    <!-- 升级、新骰子、消耗品槽位 -->
                </div>

                <div class="shop-footer">
                    <button id="btn-refresh" class="btn-secondary">刷新商店 (-50 积分)</button>
                    <div class="next-level-info">下一关目标：<span id="txt-next-target">800 点</span></div>
                    <button id="btn-next-level" class="btn-primary">进入下一关 →</button>
                </div>
            </div>
        </section>

        <!-- 结算界面 -->
        <section id="screen-victory" class="screen hidden">
            <div class="victory-box">
                <h1>YOU WIN</h1>
                <p>恭喜通关！你已成为真正的千王之王。</p>
                <button id="btn-victory-home" class="btn-primary">返回主菜单</button>
            </div>
        </section>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
